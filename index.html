<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deekshith Rathod — Portfolio V2 Coming Soon</title>
  <meta name="description" content="Deekshith Rathod's portfolio is getting a major upgrade. Launching May 15, 2026.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #6c63ff;
      --accent-glow: rgba(108, 99, 255, 0.35);
      --text: #e8e6f0;
      --muted: #8a879a;
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated gradient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      pointer-events: none;
      animation: float 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6c63ff, transparent 70%);
      top: -10%; left: -10%;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #ff6b9d, transparent 70%);
      bottom: -15%; right: -10%;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #00d4aa, transparent 70%);
      top: 50%; left: 60%;
      animation-delay: -8s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -40px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
      animation: fadeUp 1s ease-out both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(108, 99, 255, 0.1);
      border: 1px solid rgba(108, 99, 255, 0.25);
      border-radius: 100px;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      animation: fadeUp 1s ease-out 0.2s both;
    }
    .badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--accent-glow); }
      50% { opacity: 0.6; box-shadow: 0 0 0 8px transparent; }
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: fadeUp 1s ease-out 0.4s both;
    }
    h1 .highlight {
      background: linear-gradient(135deg, #6c63ff, #ff6b9d, #00d4aa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      color: var(--muted);
      line-height: 1.7;
      max-width: 540px;
      margin: 0 auto 2.5rem;
      animation: fadeUp 1s ease-out 0.6s both;
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 2.5rem;
      animation: fadeUp 1s ease-out 0.8s both;
    }
    .countdown-block {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 1.2rem 1.5rem;
      min-width: 90px;
      backdrop-filter: blur(10px);
      transition: transform 0.2s, border-color 0.3s;
    }
    .countdown-block:hover {
      transform: translateY(-2px);
      border-color: rgba(108, 99, 255, 0.3);
    }
    .countdown-number {
      font-size: 2.2rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #fff, #c4c0ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .countdown-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* CTA link */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      border-radius: 12px;
      transition: transform 0.2s, box-shadow 0.3s;
      box-shadow: 0 4px 20px var(--accent-glow);
      animation: fadeUp 1s ease-out 1s both;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    .cta svg { width: 16px; height: 16px; }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
      z-index: 1;
      animation: fadeUp 1s ease-out 1.2s both;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Grid pattern */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }

    @media (max-width: 480px) {
      .countdown-block { min-width: 72px; padding: 1rem 1.1rem; }
      .countdown-number { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="container">
    <div class="badge">
      <span class="dot"></span>
      Currently Building
    </div>

    <h1>Building <span class="highlight">V2</span> of<br>my portfolio</h1>

    <p class="subtitle">
      Sorry, you'll have to wait a little longer. I'm crafting something worth the wait. The new portfolio launches on <strong style="color: var(--text);">May 15th</strong>.
    </p>

    <div class="countdown" id="countdown">
      <div class="countdown-block">
        <div class="countdown-number" id="days">--</div>
        <div class="countdown-label">Days</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-number" id="hours">--</div>
        <div class="countdown-label">Hours</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-number" id="minutes">--</div>
        <div class="countdown-label">Minutes</div>
      </div>
      <div class="countdown-block">
        <div class="countdown-number" id="seconds">--</div>
        <div class="countdown-label">Seconds</div>
      </div>
    </div>

    <a class="cta" href="mailto:deekshithrathod@gmail.com">
      Get in touch
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12h15m0 0l-6.75-6.75M19.5 12l-6.75 6.75"/>
      </svg>
    </a>
  </div>

  <div class="footer">
    Deekshith Rathod &middot; <a href="mailto:deekshithrathod@gmail.com">deekshithrathod@gmail.com</a>
  </div>

  <script>
    const launch = new Date('2026-05-15T00:00:00').getTime();

    function tick() {
      const gap = launch - Date.now();
      if (gap <= 0) {
        document.getElementById('days').textContent = '0';
        document.getElementById('hours').textContent = '0';
        document.getElementById('minutes').textContent = '0';
        document.getElementById('seconds').textContent = '0';
        return;
      }
      const d = Math.floor(gap / 86400000);
      const h = Math.floor((gap % 86400000) / 3600000);
      const m = Math.floor((gap % 3600000) / 60000);
      const s = Math.floor((gap % 60000) / 1000);
      document.getElementById('days').textContent = d;
      document.getElementById('hours').textContent = h;
      document.getElementById('minutes').textContent = m;
      document.getElementById('seconds').textContent = s;
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
