<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deekshith Rathod</title>
<meta name="description" content="Building V2 of my portfolio. Launching May 15th, 2026.">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body{
  background:#fff9ec;color:#140800;
  font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 32px;position:relative;overflow:hidden;
}

.blob{position:fixed;pointer-events:none;border-radius:55% 45% 60% 40%/40% 60% 45% 55%}
.b1{width:480px;height:480px;background:#ffbe0b;opacity:.16;top:-20%;right:-12%}
.b2{width:340px;height:340px;background:#ff6b35;opacity:.13;bottom:-14%;left:-8%}
.b3{width:200px;height:200px;background:#ff2d6f;opacity:.09;top:38%;right:4%}

.inner{position:relative;z-index:1;text-align:center;max-width:680px;width:100%}

.stamp{
  display:inline-block;background:#ffbe0b;color:#140800;
  font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
  padding:6px 18px;border-radius:100px;margin-bottom:28px;
  border:2px solid #140800;transform:rotate(-1.5deg);
}

h1{
  font-size:clamp(40px,9vw,104px);font-weight:900;
  line-height:1;letter-spacing:-.04em;margin-bottom:20px;
}
h1 .crossed{
  display:inline-block;color:#ff6b35;
  text-decoration:line-through;
  text-decoration-thickness:5px;
  text-decoration-color:#ff2d6f;
}

.sub{
  font-size:clamp(14px,2vw,18px);line-height:1.65;
  color:#6a3208;max-width:440px;margin:0 auto 44px;
}

.cd{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:44px}
.cdi{
  background:#fff;border:3px solid #140800;border-radius:16px;
  padding:18px 22px;min-width:88px;
  box-shadow:5px 5px 0 #140800;
}
.cdn{
  font-size:clamp(28px,5vw,52px);font-weight:900;
  color:#ff6b35;font-variant-numeric:tabular-nums;line-height:1;
}
.cdl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#bbb;margin-top:4px}

.cta{
  display:inline-flex;align-items:center;gap:8px;
  background:#140800;color:#fff9ec;text-decoration:none;
  font-size:15px;font-weight:800;padding:16px 36px;
  border-radius:100px;border:3px solid #140800;
  box-shadow:5px 5px 0 #ff6b35;
  transition:transform .1s,box-shadow .1s;
}
.cta:hover{transform:translate(3px,3px);box-shadow:2px 2px 0 #ff6b35}

.foot{margin-top:28px;font-size:11px;color:#bbb;letter-spacing:.04em}
</style>
</head>
<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="inner">
    <div class="stamp">Currently Building ✦</div>
    <h1>
      Good things<br>
      take <span class="crossed">forever</span><br>
      almost.
    </h1>
    <p class="sub">
      Building V2 of this portfolio — sorry you'll have to wait a little longer. Launching <strong>May 15th</strong>. Promise.
    </p>
    <div class="cd">
      <div class="cdi"><div class="cdn" id="cd-d">--</div><div class="cdl">Days</div></div>
      <div class="cdi"><div class="cdn" id="cd-h">--</div><div class="cdl">Hours</div></div>
      <div class="cdi"><div class="cdn" id="cd-m">--</div><div class="cdl">Min</div></div>
      <div class="cdi"><div class="cdn" id="cd-s">--</div><div class="cdl">Sec</div></div>
    </div>
    <a class="cta" href="mailto:deekshithrathod@gmail.com">Get in touch &rarr;</a>
    <p class="foot">Deekshith Rathod &nbsp;&middot;&nbsp; deekshithrathod@gmail.com</p>
  </div>

  <script>
    const LAUNCH = new Date('2026-05-15T00:00:00').getTime();
    function tick() {
      const diff = LAUNCH - Date.now();
      const d = diff > 0 ? Math.floor(diff / 86400000) : 0;
      const h = diff > 0 ? Math.floor((diff % 86400000) / 3600000) : 0;
      const m = diff > 0 ? Math.floor((diff % 3600000) / 60000) : 0;
      const s = diff > 0 ? Math.floor((diff % 60000) / 1000) : 0;
      const p = n => String(n).padStart(2, '0');
      document.getElementById('cd-d').textContent = d;
      document.getElementById('cd-h').textContent = p(h);
      document.getElementById('cd-m').textContent = p(m);
      document.getElementById('cd-s').textContent = p(s);
    }
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
